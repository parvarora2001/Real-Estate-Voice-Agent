<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Real Estate Voice Agent</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1e3a8a 0%, var(--bg) 55%);
      color: var(--text); padding: 24px;
    }
    .card {
      background: var(--card); width:100%; max-width:440px; border-radius:18px;
      padding:32px; box-shadow:0 20px 60px rgba(0,0,0,.4); border:1px solid #334155;
    }
    h1 { font-size:1.45rem; margin:0 0 4px; }
    p.sub { color:var(--muted); margin:0 0 24px; font-size:.92rem; }
    label { display:block; font-size:.82rem; color:var(--muted); margin:14px 0 6px; }
    input, textarea {
      width:100%; padding:12px 14px; border-radius:10px; border:1px solid #475569;
      background:#0f172a; color:var(--text); font-size:1rem; font-family:inherit;
    }
    input:focus, textarea:focus { outline:none; border-color:var(--accent); }
    textarea { resize:vertical; min-height:64px; }
    button {
      margin-top:22px; width:100%; padding:14px; border:none; border-radius:10px;
      background:var(--accent); color:#082f49; font-size:1.05rem; font-weight:700; cursor:pointer;
    }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .status { margin-top:16px; font-size:.9rem; min-height:1.2em; text-align:center; }
    .status.ok { color:#4ade80; }
    .status.err { color:#f87171; }
    .hint { font-size:.75rem; color:var(--muted); margin-top:6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🏠 AI Real Estate Agent</h1>
    <p class="sub">Enter your details and our AI agent will call you to find your perfect property.</p>

    <form id="form">
      <label for="name">Your name</label>
      <input id="name" name="name" required placeholder="Jane Smith" />

      <label for="phone">Phone number</label>
      <input id="phone" name="phone" required placeholder="+14155550123" />
      <div class="hint">Include your country code, e.g. +1 for the US.</div>

      <label for="looking_for">What are you looking for? (optional)</label>
      <textarea id="looking_for" name="looking_for" placeholder="3-bedroom condo downtown, around $500k"></textarea>

      <button type="submit" id="submit">📞 Call me now</button>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('submit');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.className = 'status';
      status.textContent = 'Placing your call…';
      btn.disabled = true;

      const payload = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        looking_for: document.getElementById('looking_for').value,
      };

      try {
        const res = await fetch('/api/start-call', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.ok) {
          status.className = 'status ok';
          status.textContent = '✅ ' + (data.message || 'Calling you now — please answer!');
        } else {
          status.className = 'status err';
          status.textContent = '⚠️ ' + (data.error || 'Something went wrong.');
        }
      } catch (err) {
        status.className = 'status err';
        status.textContent = '⚠️ Network error. Please try again.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
